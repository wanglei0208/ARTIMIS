AlexNet:
  arch: alexnet
  ckpt: checkpoints/2018/bot1/alexnet.pth

AlertNet:
  arch: alertnet
  ckpt: checkpoints/2018/bot1/alertnet.pth

DeepNet:
  arch: deepnet
  ckpt: checkpoints/2018/bot1/deepnet.pth

IdsNet:
  arch: idsnet
  ckpt: checkpoints/2018/bot1/idsnet.pth

RF:
  arch: rf
  ckpt: checkpoints/2018/bot1/rf1.joblib

XGBOOST:
  arch: xgboost
  ckpt: checkpoints/2018/bot1/xgboost1.json

RF2:
  arch: rf2
  ckpt: checkpoints/2018/bot1/rf2.joblib

XGBOOST2:
  arch: xgboost2
  ckpt: checkpoints/2018/bot1/xgboost2.json

KITNET:
  arch: kitnet_rf
  ckpt:
    kitnet: checkpoints/2018/bot1/kitnet/kitnet_model.pkl
    rf: checkpoints/2018/bot1/kitnet/rf_model.pkl

FSNET:
  arch: fsnet
  ckpt: checkpoints/2018/bot1/fsnet.pth

MAMPF:
  arch: mampf
  ckpt:
    mampf: checkpoints/2018/bot1/mampf/extractor.pkl
    mlp: checkpoints/2018/bot1/mampf/classifier_best.pth

DIFFRF:
  arch: diff_rf
  ckpt:
    diffrf: checkpoints/2018/bot1/diff_rf/diff_rf_cicids_model.pkl
    thresh_path: checkpoints/2018/bot1/diff_rf/diff_rf_cicids_threshold.txt


LeNet:
  arch: lenet
  ckpt: checkpoints/2018/bot1/finetune/lenet.pth

LSTM:
  arch: lstm
  ckpt: checkpoints/2018/bot1/finetune/lstm.pth

MLP:
  arch: mlp
  ckpt: checkpoints/2018/bot1/finetune/mlp.pth

